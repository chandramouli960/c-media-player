# C Media Player runs uosc as a timeline-only seek bar. Play/pause, volume,
# skip and fullscreen live on the app's own Qt buttons, so uosc's controls
# row, volume slider, top bar and window border are all turned off — what's
# left is a modern YouTube-style seek bar that seeks/drags natively.

controls=never
volume=no
top_bar=no
window_border_size=0

timeline_style=line
timeline_size=44
timeline_line_width=2
timeline_border=1
timeline_cache=yes

# A thin always-on progress line at the very bottom, even when the seek bar
# itself is faded out.
progress=windowed
progress_size=3

autohide=no
pause_indicator=flash
time_precision=1
